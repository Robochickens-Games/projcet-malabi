name: build-wiki

# Typesets the project Gazette (site/index.html) from brain/** + git history and
# publishes it to GitHub Pages. New edition prints on every commit to the brain.
# Also bundles the playable prototype into site/prototype/ so the team can open
# it on a phone at <pages-url>/prototype/.
#
# One-time setup: repo Settings → Pages → Build and deployment → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "brain/**"
      - "scripts/build-wiki.mjs"
      - ".github/workflows/build-wiki.yml"
      - "product/prototypes/museum-parallax/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write # ensure the daily-note label for "Letters to the Editor"

# Let an in-progress run finish; only the newest queued edition deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history — the front-page feed reads git log

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Typeset the Gazette
        run: node scripts/build-wiki.mjs

      # Bundle the playable prototype into site/prototype/ (Vite base is './',
      # so it runs from any subpath). Served alongside the Gazette.
      - name: Build the prototype
        working-directory: product/prototypes/museum-parallax
        run: |
          npm install --no-audit --no-fund
          npm run build
          mkdir -p "$GITHUB_WORKSPACE/site/prototype"
          cp -r dist/. "$GITHUB_WORKSPACE/site/prototype/"

      # Letters to the Editor are GitHub issues titled "[note] <slug>: …" with
      # this label; the prefilled "Add a note" links rely on it existing.
      - name: Ensure the daily-note label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create daily-note \
            --repo "${{ github.repository }}" \
            --color FDE68A \
            --description "A letter to the Malabi Daily — the brain ingests it at the next sync" \
            || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
