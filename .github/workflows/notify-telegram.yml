name: notify-telegram

# Proactive sync push: when the shared brain changes on main, summarize the change
# in plain English (via GitHub Models, free) and post it to the team's Telegram
# group — so members stay synced without opening a session.
# See brain/proposals/proactive-sync-push-telegram.md.
# Requires repo secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID.

on:
  push:
    branches: [main]
    paths: ["brain/**"]
  workflow_dispatch: {}   # allow manual test runs from the Actions tab

permissions:
  contents: read
  models: read            # lets the job call GitHub Models with the built-in token

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Summarize change and send Telegram digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_MODELS_TOKEN: ${{ github.token }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping."
            exit 0
          fi

          AUTHOR="$(git log -1 --pretty='%an')"
          SUBJECT="$(git log -1 --pretty='%s')"
          BODY="$(git log -1 --pretty='%b')"
          DIFF="$(git diff HEAD~1 HEAD -- brain/ 2>/dev/null | head -c 6000)"

          # Work out the relevant Malabi Daily article: the main memory/decision
          # this commit touched. Prefer a memory file, then a decision; skip the
          # index and the status snapshot (they aren't "an article").
          CHANGED="$(git diff --name-only HEAD~1 HEAD -- 'brain/**/*.md' 2>/dev/null)"
          PRIMARY=""
          for f in $CHANGED; do
            case "$f" in */index.md|*project-status.md) continue ;; esac
            case "$f" in brain/memory/*) PRIMARY="$f"; break ;; esac
          done
          if [ -z "$PRIMARY" ]; then
            for f in $CHANGED; do
              case "$f" in brain/decisions/*) PRIMARY="$f"; break ;; esac
            done
          fi
          if [ -z "$PRIMARY" ]; then
            for f in $CHANGED; do
              case "$f" in */index.md|*project-status.md) continue ;; *.md) PRIMARY="$f"; break ;; esac
            done
          fi

          # Slug = the wiki's id for that article. Decisions use the filename;
          # memories use their frontmatter `name:` (falling back to the filename).
          SLUG=""
          if [ -n "$PRIMARY" ]; then
            case "$PRIMARY" in
              brain/decisions/*) SLUG="$(basename "$PRIMARY" .md)" ;;
              *) SLUG="$(sed -n 's/^name:[[:space:]]*//p' "$PRIMARY" | head -1 | tr -d '\r"')"
                 [ -z "$SLUG" ] && SLUG="$(basename "$PRIMARY" .md)" ;;
            esac
          fi

          # GitHub Pages base for this repo (owner lowercased), + deep link if known.
          OWNER_LC="$(printf '%s' "${{ github.repository_owner }}" | tr 'A-Z' 'a-z')"
          PAGES_BASE="https://${OWNER_LC}.github.io/${GITHUB_REPOSITORY#*/}/"
          if [ -n "$SLUG" ]; then
            GAZETTE_URL="${PAGES_BASE}#/${SLUG}"
          else
            GAZETTE_URL="$PAGES_BASE"
          fi

          SYS="You are the friendly voice of a small game studio's shared team brain. Given a change to the team's shared notes, write a short update (1-3 sentences, under ~45 words) telling the 3-person team what changed and why it matters, in warm plain English. Refer to the author by name. Do NOT use file paths, git/commit jargon, markdown, code, or hashtags. Output only the message text."
          USER="$(printf 'Author: %s\nSummary line: %s\n\nDetails:\n%s\n\nWhat changed (diff):\n%s' "$AUTHOR" "$SUBJECT" "$BODY" "$DIFF")"

          # Ask GitHub Models (free, OpenAI-compatible) to write the summary.
          REQ="$(jq -n --arg m "openai/gpt-4o-mini" --arg s "$SYS" --arg u "$USER" \
            '{model:$m, temperature:0.4, max_tokens:200,
              messages:[{role:"system",content:$s},{role:"user",content:$u}]}')"
          MODEL_RESP="$(curl -s https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer ${GH_MODELS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$REQ")"
          SUMMARY="$(printf '%s' "$MODEL_RESP" | jq -r '.choices[0].message.content // empty' 2>/dev/null)"

          # Fallback: if the model call fails, use the commit subject so a digest still goes out.
          if [ -z "$SUMMARY" ]; then
            echo "Model summary unavailable — falling back to commit subject. Response was:"
            echo "$MODEL_RESP"
            SUMMARY="$SUBJECT"
          fi

          MSG="$(printf '🧠 %s\n\n📰 Read it in The Malabi Daily:\n%s\n\nSource: %s\nRun /sync to pull the latest.' "$SUMMARY" "$GAZETTE_URL" "$COMMIT_URL")"

          # Capture the response (no pipe) — piping into `grep -q` trips pipefail
          # via SIGPIPE when grep exits early, failing the step even on success.
          RESP="$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}")"
          echo "Telegram API response: ${RESP}"
          case "$RESP" in
            *'"ok":true'*) echo "Telegram digest sent." ;;
            *) echo "Telegram send failed."; exit 1 ;;
          esac
