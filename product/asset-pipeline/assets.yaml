# assets.yaml — the work-list. One entry = one asset. Add a line, run `npm run
# generate`, get style-consistent candidates. This is the scalable surface:
# growing the game = growing this file, not rewriting code.
#
# Fields:
#   id        unique slug -> output filename + deterministic seed
#   wing      dinosaurs | space | inventions | lobby | ui   (organizes output)
#   kind      sprite (transparent, isolated object) | prop | character
#             NOTE: full-bleed parallax BACKDROPS are not generated here — those
#             are painted scenes that generate-assets.mjs (the slicer) cuts into
#             layers. This pipeline makes the isolated, transparent pieces.
#   prompt    the subject only — style is added automatically from style.yaml
#   variants  (optional) overrides default count of candidates
#   size      (optional) overrides default 1024x1024
#
# SCIENTIFIC REALISM RULE (brain/memory/shared/art-scientific-realism.md):
# every subject must be a REAL, scientifically accurate thing — actual named
# spacecraft, real instruments and devices, true-to-science specimens. Painterly
# rendering, but the depicted object must exist (or have existed). No toys,
# no fantasy gadgets, no made-up sci-fi.

