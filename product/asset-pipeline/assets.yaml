  - id: lobby-scene-pixel
    wing: lobby
    kind: scene
    variants: 1
    size: 1344x768                         # 16:9, matches the SVG layout layers
    control:
      image: out/control/lobby-control.png  # rendered from art.js by render-control.mjs
      strength: 0.8                          # layout adherence: 1.0 strict, ~0.5 loose
    style:
      prefix: >-
        detailed pixel art, 16-bit retro adventure game scene, vivid saturated
        colors, crisp clean pixels, bold readable shapes
      suffix: >-
        vibrant punchy palette, clean pixel shading, game background art,
        wide establishing shot
      negative: >-
