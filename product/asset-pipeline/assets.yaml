  # --- experiment: full lobby scene in PIXEL ART (parked — not wired into the game) ---
  # Layout from the vector source product/prototypes/museum-parallax/src/art.js
  # (lobbyBack/lobbyMid): three glowing arched windows on the back wall, a grand
  # central archway to the Dinosaur Wing, a roped-off Space Wing arch, gold
