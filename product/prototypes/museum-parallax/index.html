<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Science Museum Mystery — feel prototype</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="stage"></div>
  <div id="vignette"></div>

  <!-- HUD -->
  <header id="hud">
    <div id="hud-left">
      <button id="back-btn" class="hud-btn hidden" aria-label="Back to lobby">‹ Lobby</button>
      <button id="catalog-toggle" class="hud-btn active" aria-label="Toggle catalog">📖 Catalog</button>
    </div>
    <div id="hud-title">SCIENCE MUSEUM MYSTERY</div>
    <div id="hud-right">
      <!-- Space Wing coin purse — hidden until the player first enters the wing -->
      <div id="coin-purse" class="hidden" aria-label="Coins"><span id="coin-icon">🪙</span><span id="coin-count">0</span></div>
      <button id="inv-toggle" class="hud-btn active" aria-label="Toggle inventory">🎒 Inventory</button>
      <button id="fs-btn" class="hud-btn" aria-label="Full screen">⛶</button>
    </div>
  </header>

  <!-- left rail: the dinosaur catalog (reference) -->
  <aside id="catalog-rail" class="rail">
    <h2>📖 Catalog</h2>
    <div id="catalog-list"></div>
  </aside>

  <!-- right rail: the bag. Two pouches share it — FINDS are the puzzle items you
       drag onto exhibits, ROCKS are the Space Wing's currency you sell at the
       Supply Desk. Keeping them apart stops rocks from crowding out quest items.
       The Rocks tab only appears once the player picks up their first rock. -->
  <aside id="inventory-rail" class="rail">
    <div id="inv-tabs" role="tablist">
      <button class="inv-tab active" data-tab="finds" role="tab" aria-selected="true">🎒 Finds</button>
      <button class="inv-tab hidden" data-tab="rocks" role="tab" aria-selected="false">🪨 Rocks<span class="inv-tab-count">0</span></button>
      <button class="inv-tab hidden" data-tab="cards" role="tab" aria-selected="false">🗂 Cards<span class="inv-tab-count">0</span></button>
    </div>
    <div id="inventory-grid" class="inv-grid" data-tab="finds">
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
    </div>
    <div id="rock-grid" class="inv-grid hidden-inv" data-tab="rocks">
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
    </div>
    <div id="card-grid" class="inv-grid hidden-inv" data-tab="cards">
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
      <div class="inv-slot empty"></div>
    </div>
    <p class="inv-hint" data-tab="finds">drag a find onto the exhibit · tap ⓘ for details</p>
    <p class="inv-hint hidden-inv" data-tab="rocks">sell at the Supply Desk<br>worth <b id="rock-total">0</b> 🪙</p>
    <p class="inv-hint hidden-inv" data-tab="cards">mission cards<br><b id="card-total">0</b> of 10 found</p>
    <div id="inventory-detail" class="hidden-inv"></div>
  </aside>

  <!-- floating ghost shown while dragging an inventory item -->
  <div id="drag-ghost" class="hidden"></div>

  <!-- toast -->
  <div id="toast" class="hidden">
    <span id="toast-text"></span>
    <button id="toast-close" aria-label="Dismiss">✕</button>
  </div>

  <!-- portrait nudge (phones) -->
  <div id="rotate-overlay">
    <div class="phone">📱</div>
    <p>Rotate your phone —<br>the museum is wide!</p>
  </div>

  <!-- tilt permission (iOS) -->
  <button id="tilt-btn" class="hidden">✦ Enable tilt to look around</button>

  <!-- walk cue (grove) -->
  <div id="walk-arrow" class="hidden">walk&nbsp;<span>→</span></div>

  <!-- success -->
  <div id="success" class="hidden">
    <div id="success-card">
      <div class="big">✨ It fits! ✨</div>
      <!-- the celebration clip — plays when the fossil fits -->
      <video id="success-video" src="/video/success.mp4" muted loop playsinline preload="auto"></video>
      <p id="success-text"></p>
      <div id="fragment-badge">FOSSIL FRAGMENT&nbsp;<b>1</b>&nbsp;/ 4</div>
      <div class="success-actions">
        <button id="success-continue">Keep exploring ▸</button>
        <button id="replay-btn">Play again</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
